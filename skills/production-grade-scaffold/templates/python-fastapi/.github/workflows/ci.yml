name: ci
on: [push, pull_request]
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - name: lint
        run: ruff check .
      - name: type check
        run: mypy app
      - name: SAST
        run: bandit -r app
      - name: unit test
        run: pytest
      # integration test: spin up ephemeral containers (Testcontainers) here
      # build + sign: docker build, generate SBOM (syft), sign with cosign, attach SLSA provenance
