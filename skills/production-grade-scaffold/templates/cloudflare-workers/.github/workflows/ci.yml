name: ci
on: [push, pull_request]
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - name: type check
        run: npx tsc --noEmit
      - name: unit test
        run: npm test
      # deploy: wrangler deploy (gate behind environment protection rules)
